<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Microsoft FHIR Server &ndash; SMART on FHIR Launcher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1tMKn09JEOQfq1cGlvTkSk28nRV0+d" crossorigin="anonymous" />
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">
    <h1 class="mb-4">SMART on FHIR Standalone Launch</h1>

    <div id="loading" class="text-center py-5">
        <div class="spinner-border" role="status"><span class="visually-hidden">Loading&hellip;</span></div>
    </div>

    <div id="config-panel" class="d-none">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Configuration</h5>
                <table class="table table-sm mb-0">
                    <tbody>
                        <tr><th style="width:40%">FHIR Server</th><td id="cfg-fhir"></td></tr>
                        <tr><th>Client ID</th><td id="cfg-client-id" class="text-break"></td></tr>
                        <tr><th>Client Type</th><td><span id="cfg-client-type" class="badge bg-primary"></span></td></tr>
                        <tr><th>Scopes</th><td id="cfg-scopes" class="text-break"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button id="launchBtn" class="btn btn-success btn-lg w-100">Launch SMART App</button>
    </div>

    <div id="error-panel" class="alert alert-danger d-none mt-3"></div>
</div>

<script>
(async function () {
    try {
        const res = await fetch('/config');
        if (!res.ok) throw new Error('Failed to load configuration');
        const cfg = await res.json();

        document.getElementById('cfg-fhir').textContent = cfg.FhirServerUrl || '(not set)';
        document.getElementById('cfg-client-id').textContent = cfg.ClientId || '(not set)';
        document.getElementById('cfg-client-type').textContent = cfg.ClientType || 'public';
        document.getElementById('cfg-scopes').textContent = cfg.Scopes || '';

        document.getElementById('loading').classList.add('d-none');
        document.getElementById('config-panel').classList.remove('d-none');

        document.getElementById('launchBtn').addEventListener('click', function () {
            const launchUrl = cfg.DefaultSmartAppUrl || '/sampleapp/launch.html';
            window.location.href = launchUrl;
        });
    } catch (err) {
        document.getElementById('loading').classList.add('d-none');
        const ep = document.getElementById('error-panel');
        ep.textContent = err.message;
        ep.classList.remove('d-none');
    }
})();
</script>
</body>
</html>
