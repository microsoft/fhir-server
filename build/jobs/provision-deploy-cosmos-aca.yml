parameters:
- name: version
  type: string
- name: webAppName
  type: string
- name: acaEnvironmentName
  type: string
- name: subscription
  type: string
- name: resourceGroup
  type: string
- name: testEnvironmentUrl
  type: string
- name: imageTag
  type: string
- name: reindexEnabled
  type: boolean
  default: true
- name: keyVaultName
  type: string

jobs:
- job: provisionEnvironment
  pool:
    name: '$(SharedLinuxPool)'
    vmImage: '$(LinuxVmImage)'
  steps:
  - task: AzureKeyVault@1
    displayName: 'Azure Key Vault: resolute-oss-tenant-info'
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      KeyVaultName: 'resolute-oss-tenant-info'

  - task: AzurePowerShell@5
    name: SetAcaOutputs
    displayName: 'Deploy ACA for Cosmos and emit test URL'
    retryCountOnTaskFailure: 1
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      azurePowerShellVersion: latestVersion
      pwsh: true
      ScriptType: inlineScript
      Inline: |
        Add-Type -AssemblyName System.Web

        # Import retry helper for transient error handling
        . $(System.DefaultWorkingDirectory)/release/scripts/PowerShell/Invoke-WithRetry.ps1

        $deployPath = "$(System.DefaultWorkingDirectory)/test/Configuration"

        $testConfig = ConvertFrom-Json (Get-Content -Raw "$deployPath/testconfiguration.json")
        $flattenedTestConfig = $(System.DefaultWorkingDirectory)/release/scripts/PowerShell/ConvertTo-FlattenedConfigurationHashtable.ps1 -InputObject $testConfig

        $additionalProperties = $flattenedTestConfig
        $additionalProperties["TaskHosting__PollingFrequencyInSeconds"] = 1
        $additionalProperties["FhirServer__CoreFeatures__SearchParameterCacheRefreshIntervalSeconds"] = 2
        $additionalProperties["ASPNETCORE_FORWARDEDHEADERS_ENABLED"] = "true"

        $staticEnvNames = @(
            "ASPNETCORE_FORWARDEDHEADERS_ENABLED",
            "KeyVault__Endpoint",
            "FhirServer__Security__Enabled",
            "FhirServer__Security__EnableAadSmartOnFhirProxy",
            "FhirServer__Security__Authentication__Authority",
            "FhirServer__Security__Authentication__Audience",
            "DataStore",
            "CosmosDb__UseManagedIdentity",
            "CosmosDb__ContinuationTokenSizeLimitInKb",
            "CosmosDb__UseQueueClientJobs",
            "TaskHosting__Enabled",
            "TaskHosting__PollingFrequencyInSeconds",
            "TaskHosting__MaxRunningTaskCount",
            "FhirServer__CoreFeatures__SearchParameterCacheRefreshIntervalSeconds",
            "FhirServer__Operations__Export__Enabled",
            "FhirServer__Operations__Export__StorageAccountUri",
            "FhirServer__Operations__Import__Enabled",
            "FhirServer__Operations__IntegrationDataStore__StorageAccountUri",
            "FhirServer__Operations__ConvertData__Enabled",
            "FhirServer__Operations__ConvertData__ContainerRegistryServers__0",
            "FhirServer__Operations__Reindex__Enabled"
        )

        $additionalEnvVars = @()
        foreach ($entry in $additionalProperties.GetEnumerator()) {
            if ($staticEnvNames -contains $entry.Key) {
                continue
            }

            if ($null -eq $entry.Value) {
                continue
            }

            $value = if ($entry.Value -is [bool]) { $entry.Value.ToString().ToLowerInvariant() } else { [string]$entry.Value }
            if ([string]::IsNullOrWhiteSpace($value)) {
                continue
            }

            $additionalEnvVars += @{
                name = [string]$entry.Key
                value = $value
            }
        }

        $webAppName = "${{ parameters.webAppName }}".ToLowerInvariant()
        $acaEnvironmentName = "${{ parameters.acaEnvironmentName }}".ToLowerInvariant()

        if ($acaEnvironmentName.Length -gt 32) {
            $acaEnvironmentName = $acaEnvironmentName.Substring(0, 32).TrimEnd('-')
        }

        if ($acaEnvironmentName.Length -lt 2) {
            $acaEnvironmentName = "ca-$acaEnvironmentName"
        }

        # Cosmos DB account uses the same name as the container app (matching App Service convention)
        $cosmosDbAccountName = $webAppName
        $resourceGroupName = "${{ parameters.resourceGroup }}"

        # Ensure Cosmos DB account exists
        $existingAccount = Get-AzCosmosDBAccount -ResourceGroupName $resourceGroupName -Name $cosmosDbAccountName -ErrorAction SilentlyContinue
        if ($null -eq $existingAccount) {
            Write-Host "Cosmos DB account '$cosmosDbAccountName' does not exist. Creating..."
            Invoke-WithRetry -OperationName "Create Cosmos DB Account" -ScriptBlock {
                New-AzCosmosDBAccount `
                    -ResourceGroupName $resourceGroupName `
                    -Name $cosmosDbAccountName `
                    -Location (Get-AzResourceGroup -Name $resourceGroupName).Location `
                    -ApiKind "Sql" `
                    -DefaultConsistencyLevel "Strong" `
                    -ErrorAction Stop
            }
            Write-Host "Cosmos DB account '$cosmosDbAccountName' created successfully."
        } else {
            Write-Host "Cosmos DB account '$cosmosDbAccountName' already exists."
        }

        # Ensure Cosmos DB database exists
        $cosmosDbDatabaseName = "health"
        $existingDb = Get-AzCosmosDBSqlDatabase -ResourceGroupName $resourceGroupName -AccountName $cosmosDbAccountName -Name $cosmosDbDatabaseName -ErrorAction SilentlyContinue
        if ($null -eq $existingDb) {
            Write-Host "Cosmos DB database '$cosmosDbDatabaseName' does not exist. Creating with autoscale 10000 RU..."
            Invoke-WithRetry -OperationName "Create Cosmos DB Database" -ScriptBlock {
                New-AzCosmosDBSqlDatabase `
                    -ResourceGroupName $resourceGroupName `
                    -AccountName $cosmosDbAccountName `
                    -Name $cosmosDbDatabaseName `
                    -AutoscaleMaxThroughput 10000 `
                    -ErrorAction Stop
            }
            Write-Host "Cosmos DB database '$cosmosDbDatabaseName' created successfully."
        } else {
            Write-Host "Cosmos DB database '$cosmosDbDatabaseName' already exists."
        }

        # Add DevOps MI permission to Cosmos database (Data Contributor role)
        Write-Host "Adding DevOps MI permission to Cosmos database..."
        $account = Get-AzContext
        $principalId = Invoke-WithRetry -OperationName "Get Service Principal" -ScriptBlock {
            (Get-AzADServicePrincipal -ApplicationId $account.Account.Id -ErrorAction Stop).Id
        }

        Invoke-WithRetry -OperationName "CosmosDB Role Assignment" -ScriptBlock {
            New-AzCosmosDBSqlRoleAssignment `
                -AccountName $cosmosDbAccountName `
                -ResourceGroupName $resourceGroupName `
                -Scope "/" `
                -PrincipalId $principalId `
                -RoleDefinitionId "00000000-0000-0000-0000-000000000002" `
                -ErrorAction Stop
        }
        Write-Host "DevOps MI Cosmos DB role assignment completed."

        $templateParameters = @{
            containerAppName = $webAppName
            containerAppsEnvironmentName = $acaEnvironmentName
            keyVaultName = "${{ parameters.keyVaultName }}".ToLowerInvariant()
            fhirVersion = "${{ parameters.version }}"
            registryName = '$(azureContainerRegistry)'
            imageTag = "${{ parameters.imageTag }}"
            cosmosDbAccountName = $cosmosDbAccountName
            securityAuthenticationAuthority = "https://sts.windows.net/$(tenant-id-guid)"
            securityAuthenticationAudience = "${{ parameters.testEnvironmentUrl }}"
            enableExport = $true
            enableImport = $true
            enableConvertData = $true
            enableReindex = if ("${{ parameters.reindexEnabled }}" -eq "true") { $true } else { $false }
            minReplicas = 0
            maxReplicas = 8
            acrPullUserAssignedManagedIdentityResourceId = '/subscriptions/a1766500-6fd5-4f5c-8515-607798271014/resourceGroups/HealthPlatformRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/acr-pull-uami'
            additionalEnvVars = $additionalEnvVars
        }

        $deploymentName = "$webAppName"

        Write-Host "Provisioning ACA resources"
        Write-Host "ResourceGroupName: $resourceGroupName"
        Write-Host "ContainerAppName: $webAppName"
        Write-Host "ContainerAppsEnvironmentName: $acaEnvironmentName"
        Write-Host "CosmosDbAccountName: $cosmosDbAccountName"

        $deploymentResult = Invoke-WithRetry -OperationName "ACA Deployment" -ScriptBlock {
            New-AzResourceGroupDeployment -Name $deploymentName -ResourceGroupName $resourceGroupName -TemplateFile $(System.DefaultWorkingDirectory)/samples/templates/aca/fhir-cosmos-aca.bicep -TemplateParameterObject $templateParameters -Verbose -ErrorAction Stop
        }

        # Assign Cosmos DB Data Contributor role to the container app's system-assigned identity
        $containerAppPrincipalId = (Get-AzResource -ResourceGroupName $resourceGroupName -ResourceType "Microsoft.App/containerApps" -Name $webAppName -ApiVersion "2023-05-01" -ExpandProperties).Identity.PrincipalId
        if (-not [string]::IsNullOrWhiteSpace($containerAppPrincipalId)) {
            Write-Host "Assigning Cosmos DB Data Contributor role to container app identity ($containerAppPrincipalId)..."
            Invoke-WithRetry -OperationName "CosmosDB Role Assignment for Container App" -ScriptBlock {
                New-AzCosmosDBSqlRoleAssignment `
                    -AccountName $cosmosDbAccountName `
                    -ResourceGroupName $resourceGroupName `
                    -Scope "/" `
                    -PrincipalId $containerAppPrincipalId `
                    -RoleDefinitionId "00000000-0000-0000-0000-000000000002" `
                    -ErrorAction Stop
            }
            Write-Host "Container app Cosmos DB role assignment completed."

            # Assign DocumentDB Account Contributor ARM role so ResourceManagerCollectionSetup
            # can perform control plane operations (read/create databases and collections).
            $cosmosDbResourceId = (Get-AzCosmosDBAccount -ResourceGroupName $resourceGroupName -Name $cosmosDbAccountName).Id
            Write-Host "Assigning DocumentDB Account Contributor ARM role on Cosmos DB account..."
            $existingArmRole = Get-AzRoleAssignment -ObjectId $containerAppPrincipalId -RoleDefinitionName "DocumentDB Account Contributor" -Scope $cosmosDbResourceId -ErrorAction SilentlyContinue
            if ($null -eq $existingArmRole) {
                Invoke-WithRetry -OperationName "ARM Role Assignment for Container App" -ScriptBlock {
                    New-AzRoleAssignment `
                        -ObjectId $containerAppPrincipalId `
                        -RoleDefinitionName "DocumentDB Account Contributor" `
                        -Scope $cosmosDbResourceId `
                        -ErrorAction Stop
                }
                Write-Host "DocumentDB Account Contributor ARM role assigned."
            } else {
                Write-Host "DocumentDB Account Contributor ARM role already assigned."
            }
        } else {
            Write-Warning "Could not retrieve container app system-assigned identity principal ID."
        }

        # Associate Cosmos DB with Network Security Perimeter
        $nspName = "nsp-$resourceGroupName"
        $associationName = "cosmosdb-$webAppName-association"

        Write-Host "Associating CosmosDB with Network Security Perimeter: $nspName"
        $nspTemplateParameters = @{
            'nspName' = $nspName
            'resourceName' = $cosmosDbAccountName
            'resourceType' = 'Microsoft.DocumentDB/databaseAccounts'
            'associationName' = $associationName
            'accessMode' = 'Learning'
            'nspProfile' = 'default'
        }

        Invoke-WithRetry -OperationName "NSP Association Deployment" -ScriptBlock {
            New-AzResourceGroupDeployment `
                -ResourceGroupName $resourceGroupName `
                -Name "$webAppName-cosmosdb-nsp-association" `
                -TemplateFile $(System.DefaultWorkingDirectory)/samples/templates/nsp-resource-association.json `
                -TemplateParameterObject $nspTemplateParameters `
                -Verbose `
                -ErrorAction Stop
        }
        Write-Host "Successfully associated CosmosDB with NSP."

        $containerAppUrl = $deploymentResult.Outputs.containerAppUrl.Value
        if ([string]::IsNullOrWhiteSpace($containerAppUrl)) {
            throw "ACA deployment output did not contain containerAppUrl"
        }

        $containerAppUrl = $containerAppUrl.TrimEnd('/')
        $healthCheckUrl = "$containerAppUrl/health/check"

        $timeoutMinutes = 7
        $consecutiveSuccessRequired = 5
        $consecutiveSuccessCount = 0
        $startTime = Get-Date
        $timeoutTime = $startTime.AddMinutes($timeoutMinutes)

        Write-Host "Starting health check for $healthCheckUrl"
        Write-Host "Timeout: $timeoutMinutes minutes, consecutive successes required: $consecutiveSuccessRequired"

        Do {
          Start-Sleep -s 5
          Write-Host "Checking: $healthCheckUrl (consecutive successes: $consecutiveSuccessCount/$consecutiveSuccessRequired)"
          try {
            $response = Invoke-WebRequest -Uri $healthCheckUrl -UseBasicParsing
            if ($response.StatusCode -eq 200) {
              $consecutiveSuccessCount++
              Write-Host "Success ($consecutiveSuccessCount/$consecutiveSuccessRequired)"
            }
            else {
              Write-Host "Non-200 response ($($response.StatusCode)), resetting count"
              $consecutiveSuccessCount = 0
            }
          }
          catch {
            Write-Host $_.Exception.Message
            $consecutiveSuccessCount = 0
          }
          finally {
            $Error.Clear()
          }

          if ((Get-Date) -gt $timeoutTime) {
            $elapsed = [math]::Round(((Get-Date) - $startTime).TotalMinutes, 2)
            Write-Error "Health check timed out after $elapsed minutes ($consecutiveSuccessCount/$consecutiveSuccessRequired consecutive successes)"
            throw "ACA health check timed out"
          }
        } While ($consecutiveSuccessCount -lt $consecutiveSuccessRequired)

        $elapsed = [math]::Round(((Get-Date) - $startTime).TotalSeconds, 2)
        Write-Host "ACA health check passed with $consecutiveSuccessRequired consecutive successes after $elapsed seconds"

        Write-Host "##vso[task.setvariable variable=TestEnvironmentUrl_${{ parameters.version }};isOutput=true]$containerAppUrl"
        Write-Host "##vso[task.setvariable variable=TestEnvironmentUrl;isOutput=true]$containerAppUrl"
