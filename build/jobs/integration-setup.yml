steps:
  - task: DownloadBuildArtifacts@0
    inputs:
      buildType: 'current'
      downloadType: 'single'
      downloadPath: '$(System.ArtifactsDirectory)'
      artifactName: 'IntegrationTests'

  - task: UseDotNet@2
    displayName: Use .NET 9 runtime
    inputs:
      packageType: 'runtime'
      version: '9.0.17'

  - task: UseDotNet@2
    inputs:
      useGlobalJson: true
