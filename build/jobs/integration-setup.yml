steps:
  - task: DownloadBuildArtifacts@0
    inputs:
      buildType: 'current'
      downloadType: 'single'
      downloadPath: '$(System.ArtifactsDirectory)'
      artifactName: 'IntegrationTests'

  - task: UseDotNet@2
    displayName: Use .NET 9 SDK
    inputs:
      packageType: 'sdk'
      version: '9.0.315'

  - task: UseDotNet@2
    inputs:
      useGlobalJson: true
