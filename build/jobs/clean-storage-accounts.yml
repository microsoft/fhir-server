parameters:
- name: environmentName
  type: string
# When set, emits a deployment job targeting this ADO Environment so the
# Exclusive Lock check on the env serializes concurrent CI runs.
- name: lockEnvironment
  type: string
  default: ''

jobs:
- ${{ if eq(parameters.lockEnvironment, '') }}:
  - job: "cleanStorageAccounts"
    pool:
      vmImage: $(WindowsVmImage)
    steps:
    - template: clean-storage-accounts-steps.yml
      parameters:
        environmentName: ${{ parameters.environmentName }}

- ${{ if ne(parameters.lockEnvironment, '') }}:
  - deployment: "cleanStorageAccounts"
    environment: ${{ parameters.lockEnvironment }}
    pool:
      vmImage: $(WindowsVmImage)
    strategy:
      runOnce:
        deploy:
          steps:
          - template: clean-storage-accounts-steps.yml
            parameters:
              environmentName: ${{ parameters.environmentName }}
