parameters:
- name: minReplicas
  type: number
- name: subscription
  type: string
- name: resourceGroup
  type: string

jobs:
- job: scaleContainerApps
  displayName: 'Scale container apps to min=${{ parameters.minReplicas }}'
  pool:
    name: '$(SharedLinuxPool)'
    vmImage: '$(LinuxVmImage)'
  steps:
  - task: AzureCLI@2
    displayName: 'Set minReplicas=${{ parameters.minReplicas }} on all CI container apps'
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $ErrorActionPreference = 'Continue'
        $resourceGroup = '${{ parameters.resourceGroup }}'
        $minReplicas = ${{ parameters.minReplicas }}

        Write-Host "Enumerating container apps in resource group '$resourceGroup'..."
        $apps = (az containerapp list -g $resourceGroup --query "[].name" -o tsv) -split "`n" |
                ForEach-Object { $_.Trim() } |
                Where-Object { $_ }

        if (-not $apps -or $apps.Count -eq 0) {
          Write-Host "##[warning]No container apps found in '$resourceGroup'. Nothing to scale."
          exit 0
        }

        Write-Host "Found $($apps.Count) container app(s): $($apps -join ', ')"

        $failures = @()
        foreach ($app in $apps) {
          Write-Host "Setting minReplicas=$minReplicas on $app"
          az containerapp update -g $resourceGroup -n $app --min-replicas $minReplicas -o none
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##[warning]Failed to scale $app (exit=$LASTEXITCODE)"
            $failures += $app
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host "##[error]Failed to scale: $($failures -join ', ')"
          exit 1
        }
