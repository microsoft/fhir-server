parameters:
- name: minReplicas
  type: number
- name: subscription
  type: string
- name: resourceGroup
  type: string
# When set, emits a deployment job targeting this ADO Environment so the
# Exclusive Lock check on the env serializes concurrent CI runs.
- name: lockEnvironment
  type: string
  default: ''

jobs:
- ${{ if eq(parameters.lockEnvironment, '') }}:
  - job: scaleContainerApps
    displayName: 'Scale container apps to min=${{ parameters.minReplicas }}'
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: ../tasks/scale-container-apps-steps.yml
      parameters:
        minReplicas: ${{ parameters.minReplicas }}
        subscription: ${{ parameters.subscription }}
        resourceGroup: ${{ parameters.resourceGroup }}

- ${{ if ne(parameters.lockEnvironment, '') }}:
  - deployment: scaleContainerApps
    displayName: 'Scale container apps to min=${{ parameters.minReplicas }}'
    environment: ${{ parameters.lockEnvironment }}
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    strategy:
      runOnce:
        deploy:
          steps:
          - template: ../tasks/scale-container-apps-steps.yml
            parameters:
              minReplicas: ${{ parameters.minReplicas }}
              subscription: ${{ parameters.subscription }}
              resourceGroup: ${{ parameters.resourceGroup }}
