parameters:
- name: version
  type: string
- name: keyVaultName
  type: string
- name: containerAppName
  type: string
- name: mainCategoryFilter
  type: string
  default: 'Category!=ExportLongRunning&Category!=IndexAndReindex'
- name: runReindexJob
  type: boolean
  default: true
# When set, emits deployment jobs targeting this ADO Environment so the
# Exclusive Lock check on the env serializes concurrent CI runs.
- name: lockEnvironment
  type: string
  default: ''

jobs:
# ---------- Integration tests ----------
- ${{ if eq(parameters.lockEnvironment, '') }}:
  - job: CosmosIntegrationTests
    timeoutInMinutes: 75
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: cosmos-integration-tests-steps.yml
      parameters:
        version: ${{ parameters.version }}
        keyVaultName: ${{ parameters.keyVaultName }}
        containerAppName: ${{ parameters.containerAppName }}

- ${{ if ne(parameters.lockEnvironment, '') }}:
  - deployment: CosmosIntegrationTests
    timeoutInMinutes: 75
    environment: ${{ parameters.lockEnvironment }}
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    strategy:
      runOnce:
        deploy:
          steps:
          - template: cosmos-integration-tests-steps.yml
            parameters:
              version: ${{ parameters.version }}
              keyVaultName: ${{ parameters.keyVaultName }}
              containerAppName: ${{ parameters.containerAppName }}

# ---------- E2E tests ----------
- ${{ if eq(parameters.lockEnvironment, '') }}:
  - job: 'cosmosE2eTests'
    timeoutInMinutes: 75
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'CosmosDb'
        categoryFilter: '${{ parameters.mainCategoryFilter }}'

- ${{ if ne(parameters.lockEnvironment, '') }}:
  - deployment: 'cosmosE2eTests'
    timeoutInMinutes: 75
    dependsOn: []
    environment: ${{ parameters.lockEnvironment }}
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    strategy:
      runOnce:
        deploy:
          steps:
          - template: e2e-setup.yml
          - template: e2e-tests.yml
            parameters:
              version: ${{ parameters.version }}
              containerAppName: '${{ parameters.containerAppName }}'
              appServiceType: 'CosmosDb'
              categoryFilter: '${{ parameters.mainCategoryFilter }}'

# ---------- E2E Reindex tests (conditional) ----------
- ${{ if eq(parameters.runReindexJob, true) }}:
  - ${{ if eq(parameters.lockEnvironment, '') }}:
    - job: 'cosmosE2eTests_Reindex'
      timeoutInMinutes: 75
      dependsOn: []
      pool:
        name: '$(SharedLinuxPool)'
        vmImage: '$(LinuxVmImage)'
      steps:
      - template: e2e-setup.yml
      - template: e2e-tests.yml
        parameters:
          version: ${{ parameters.version }}
          containerAppName: '${{ parameters.containerAppName }}'
          appServiceType: 'CosmosDb'
          categoryFilter: 'Category=IndexAndReindex'
          testRunTitleSuffix: ' Reindex'

  - ${{ if ne(parameters.lockEnvironment, '') }}:
    - deployment: 'cosmosE2eTests_Reindex'
      timeoutInMinutes: 75
      dependsOn: []
      environment: ${{ parameters.lockEnvironment }}
      pool:
        name: '$(SharedLinuxPool)'
        vmImage: '$(LinuxVmImage)'
      strategy:
        runOnce:
          deploy:
            steps:
            - template: e2e-setup.yml
            - template: e2e-tests.yml
              parameters:
                version: ${{ parameters.version }}
                containerAppName: '${{ parameters.containerAppName }}'
                appServiceType: 'CosmosDb'
                categoryFilter: 'Category=IndexAndReindex'
                testRunTitleSuffix: ' Reindex'
