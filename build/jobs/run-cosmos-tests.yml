parameters:
- name: version
  type: string
- name: keyVaultName
  type: string
- name: containerAppName
  type: string
- name: mainCategoryFilter
  type: string
  default: 'Category!=ExportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex'
- name: runReindexJob
  type: boolean
  default: true
- name: runShardedIntegrationTests
  type: boolean
  default: false
- name: integrationTestShards
  type: object
  default:
    - name: General
      testFilter: 'Category!=SmartOnFhir&Category!=IndexAndReindex&Category!=Search&Category!=SearchParameterStatus&FullyQualifiedName!~CosmosDb'
    - name: SmartSearch
      testFilter: 'Category=SmartOnFhir'
    - name: Search
      testFilter: '(Category=Search|Category=SearchParameterStatus)&FullyQualifiedName!~SqlServer'
    - name: Reindex
      testFilter: 'Category=IndexAndReindex&FullyQualifiedName!~SqlServer'
    # CosmosSpecific is the catch-all for Cosmos-named classes and Cosmos data-store variants.
    # FullyQualifiedName~CosmosDb matches both Cosmos-only test classes and the "(CosmosDb)" suffix
    # on every DataStore.All test, so the categorized shards above must be excluded here to avoid
    # running those tests twice (mirrors the SqlSpecific exclusions).
    - name: CosmosSpecific
      testFilter: 'FullyQualifiedName~CosmosDb&Category!=IndexAndReindex&Category!=Search&Category!=SearchParameterStatus&Category!=SmartOnFhir'
- name: runShardedE2eJobs
  type: boolean
  default: false
- name: e2eTestShards
  type: object
  # mainCategoryFilter default is inlined here because ADO does not allow ${{ parameters.x }} in object parameter defaults.
  default:
    - name: General
      testFilter: 'FullyQualifiedName~CosmosDb&Category!=ExportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkDelete&Category!=CustomSearch&Category!=History&Category!=Import&Category!=Search&Category!=Sort&Category!=CompartmentSearch&Category!=ConditionalOperations&Category!=Patch&Category!=Bundle&Category!=BundleTransaction'
    - name: Search
      testFilter: 'FullyQualifiedName~CosmosDb&Category!=ExportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&(Category=Search|Category=Sort|Category=CompartmentSearch)&Category!=CustomSearch&Category!=BundleTransaction'
    - name: Mutation
      testFilter: 'FullyQualifiedName~CosmosDb&Category!=ExportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&(Category=ConditionalOperations|Category=Patch|Category=Bundle|Category=BundleTransaction)'
    - name: History
      testFilter: 'FullyQualifiedName~CosmosDb&Category!=ExportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category=History'
- name: e2eParallelizeTestCollections
  type: boolean
  default: false

jobs:

- ${{ if eq(parameters.runShardedIntegrationTests, false) }}:
  - job: "CosmosIntegrationTests"
    timeoutInMinutes: 75
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - checkout: self
      fetchDepth: 1
      fetchTags: false
      path: source

    - template: integration-setup.yml

    - template: integration-tests-extract.yml
      parameters:
        version: ${{ parameters.version }}

    - template: integration-tests-run.yml
      parameters:
        version: ${{ parameters.version }}
        dataStore: 'Cosmos'
        keyVaultName: '${{ parameters.keyVaultName }}'
        containerAppName: '${{ parameters.containerAppName }}'
        testFilter: 'FullyQualifiedName!~SqlServer'
        testRunTitle: '${{ parameters.version }} Cosmos Integration Tests'
        artifactSuffix: 'Cosmos_${{ parameters.version }}'

- ${{ if eq(parameters.runShardedIntegrationTests, true) }}:
  - ${{ each shard in parameters.integrationTestShards }}:
    - job: 'CosmosIntegrationTests_${{ shard.name }}'
      timeoutInMinutes: 75
      ${{ if eq(shard.name, 'SmartSearch') }}:
        condition: or(eq('${{ parameters.version }}', 'R4'), eq('${{ parameters.version }}', 'R4B'))
      pool:
        name: '$(SharedLinuxPool)'
        vmImage: '$(LinuxVmImage)'
      steps:
      - checkout: self
        fetchDepth: 1
        fetchTags: false
        path: source

      - template: integration-setup.yml

      - template: integration-tests-extract.yml
        parameters:
          version: ${{ parameters.version }}

      - template: integration-tests-run.yml
        parameters:
          version: ${{ parameters.version }}
          dataStore: 'Cosmos'
          keyVaultName: '${{ parameters.keyVaultName }}'
          containerAppName: '${{ parameters.containerAppName }}'
          testFilter: 'FullyQualifiedName!~SqlServer&${{ shard.testFilter }}'
          testRunTitle: '${{ parameters.version }} Cosmos Integration Tests ${{ shard.name }}'
          artifactSuffix: 'Cosmos_${{ parameters.version }}_${{ shard.name }}'

- ${{ if eq(parameters.runShardedE2eJobs, false) }}:
  - job: 'cosmosE2eTests'
    timeoutInMinutes: 75
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'CosmosDb'
        testFilter: 'FullyQualifiedName~CosmosDb&${{ parameters.mainCategoryFilter }}'
        parallelizeTestCollections: ${{ parameters.e2eParallelizeTestCollections }}

- ${{ if eq(parameters.runShardedE2eJobs, true) }}:
  - ${{ each shard in parameters.e2eTestShards }}:
    - job: 'cosmosE2eTests_${{ shard.name }}'
      timeoutInMinutes: 75
      dependsOn: []
      pool:
        name: '$(SharedLinuxPool)'
        vmImage: '$(LinuxVmImage)'
      variables:
        AllowPtrToDetectTestRunRetryFiles: true
      steps:
      - template: e2e-setup.yml
      - template: e2e-tests.yml
        parameters:
          version: ${{ parameters.version }}
          containerAppName: '${{ parameters.containerAppName }}'
          appServiceType: 'CosmosDb'
          testFilter: '${{ shard.testFilter }}'
          testRunTitleSuffix: ' ${{ shard.name }}'
          parallelizeTestCollections: ${{ parameters.e2eParallelizeTestCollections }}

- ${{ if eq(parameters.runShardedE2eJobs, true) }}:
  - job: 'cosmosE2eTests_RequiresIsolation'
    timeoutInMinutes: 75
    dependsOn:
    - ${{ each shard in parameters.e2eTestShards }}:
      - 'cosmosE2eTests_${{ shard.name }}'
    condition: succeededOrFailed()
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'CosmosDb'
        testFilter: 'FullyQualifiedName~CosmosDb&Category=RequiresIsolation&Category!=ExportLongRunning'
        testRunTitleSuffix: ' RequiresIsolation'
        parallelizeTestCollections: ${{ parameters.e2eParallelizeTestCollections }}

- ${{ if and(eq(parameters.runReindexJob, true), eq(parameters.runShardedE2eJobs, false)) }}:
  - job: 'cosmosE2eTests_Reindex'
    timeoutInMinutes: 75
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'CosmosDb'
        testFilter: 'FullyQualifiedName~CosmosDb&Category=IndexAndReindex'
        testRunTitleSuffix: ' Reindex'
        parallelizeTestCollections: ${{ parameters.e2eParallelizeTestCollections }}
