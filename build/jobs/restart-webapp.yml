parameters:
- name: webAppName
  type: string
- name: subscription
  type: string
- name: resourceGroup
  type: string

jobs:
- job: provisionEnvironment
  pool:
    name: '$(DefaultLinuxPool)'
    vmImage: '$(LinuxVmImage)'
  steps:
  - task: AzureCLI@2
    displayName: 'Restart Container App'
    inputs:
      azureSubscription: '${{ parameters.subscription }}'
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $containerAppName = "${{ parameters.webAppName }}".ToLower()
        $rgName = "${{ parameters.resourceGroup }}"

        # Create a new revision to force restart
        $suffix = "r$(Get-Date -Format 'yyMMddHHmmss')"
        Write-Host "Restarting container app '$containerAppName' with revision suffix '$suffix'..."
        az containerapp update `
          --name $containerAppName `
          --resource-group $rgName `
          --revision-suffix $suffix

        if ($LASTEXITCODE -ne 0) { throw "Failed to restart container app '$containerAppName'" }
        Write-Host "Container app revision updated successfully."

  - template: ../tasks/container-app-health-check.yml
    parameters:
      containerAppName: ${{ parameters.webAppName }}
      resourceGroup: ${{ parameters.resourceGroup }}
      subscription: ${{ parameters.subscription }}