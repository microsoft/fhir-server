parameters:
- name: version
  type: string
- name: keyVaultName
  type: string
- name: containerAppName
  type: string
- name: integrationSqlServerName
  type: string
- name: mainCategoryFilter
  type: string
  default: 'Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate'
- name: runShardedIntegrationTests
  type: boolean
  default: false
- name: integrationTestShards
  type: object
  # Keep category shards before class-name shards. New SQL-heavy integration test classes may need to be added to SqlSpecific.
  # Recheck local discovery counts when changing integration test categories or shard filters.
  default:
    - name: General
      testFilter: 'Category!=SmartOnFhir&Category!=IndexAndReindex&Category!=Search&Category!=SearchParameterStatus&FullyQualifiedName!~SqlServer&FullyQualifiedName!~SqlComplex&FullyQualifiedName!~SqlDataReader&FullyQualifiedName!~SqlRetry&FullyQualifiedName!~QueryPlanReuseChecker&FullyQualifiedName!~QueueClient&FullyQualifiedName!~ExpiredResourceCleanupWatchdog&FullyQualifiedName!~SearchParameterOptimisticConcurrency'
    - name: SmartSearch
      testFilter: 'Category=SmartOnFhir'
    - name: Search
      testFilter: '(Category=Search|Category=SearchParameterStatus)&Category!=SmartOnFhir'
    - name: Reindex
      testFilter: 'Category=IndexAndReindex'
    - name: SqlSpecific
      testFilter: '(FullyQualifiedName~SqlServer|FullyQualifiedName~SqlComplex|FullyQualifiedName~SqlDataReader|FullyQualifiedName~SqlRetry|FullyQualifiedName~QueryPlanReuseChecker|FullyQualifiedName~QueueClient|FullyQualifiedName~ExpiredResourceCleanupWatchdog|FullyQualifiedName~SearchParameterOptimisticConcurrency)&Category!=IndexAndReindex&Category!=Search&Category!=SearchParameterStatus&Category!=SmartOnFhir'
- name: runShardedE2eJobs
  type: boolean
  default: false
- name: e2eTestShards
  type: object
  # Shard names must be valid Azure Pipelines job identifiers. Tests tagged RequiresIsolation run in a terminal lane below.
  # mainCategoryFilter default is inlined here because ADO does not allow ${{ parameters.x }} in object parameter defaults.
  default:
    - name: General
      testFilter: 'FullyQualifiedName~SqlServer&Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate&Category!=BulkDelete&Category!=CustomSearch&Category!=History&Category!=Import&Category!=Search&Category!=Sort&Category!=CompartmentSearch&Category!=ConditionalOperations&Category!=Patch&Category!=Bundle&Category!=BundleTransaction'
    - name: Search
      testFilter: 'FullyQualifiedName~SqlServer&Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate&(Category=Search|Category=Sort|Category=CompartmentSearch)&Category!=CustomSearch&Category!=BundleTransaction'
    - name: Import
      testFilter: 'FullyQualifiedName~SqlServer&Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate&Category=Import'
    - name: Mutation
      testFilter: 'FullyQualifiedName~SqlServer&Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate&(Category=ConditionalOperations|Category=Patch|Category=Bundle|Category=BundleTransaction)'
    - name: BulkDelete
      testFilter: 'FullyQualifiedName~SqlServer&Category=BulkDelete'
    - name: CustomSearch
      testFilter: 'FullyQualifiedName~SqlServer&FullyQualifiedName~CustomSearchParamTests&Category=Search&Category=IndexAndReindex'
    - name: History
      testFilter: 'FullyQualifiedName~SqlServer&Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate&Category=History'
- name: runReindexJob
  type: boolean
  default: true
- name: runBulkUpdateJob
  type: boolean
  default: true
jobs:

- ${{ if eq(parameters.runShardedIntegrationTests, false) }}:
  - job: "SqlIntegrationTests"
    timeoutInMinutes: 75
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - checkout: self
      fetchDepth: 1
      fetchTags: false
      path: source

    - template: integration-setup.yml

    - template: integration-tests-extract.yml
      parameters:
        version: ${{ parameters.version }}

    - template: integration-tests-run.yml
      parameters:
        version: ${{ parameters.version }}
        dataStore: 'Sql'
        keyVaultName: '${{ parameters.keyVaultName }}'
        testFilter: 'FullyQualifiedName!~CosmosDb'
        testRunTitle: '${{ parameters.version }} SQL Integration Tests'
        artifactSuffix: 'Sql_${{ parameters.version }}'
        integrationSqlServerName: '${{ parameters.integrationSqlServerName }}'

- ${{ if eq(parameters.runShardedIntegrationTests, true) }}:
  - ${{ each shard in parameters.integrationTestShards }}:
    - ${{ if or(ne(shard.name, 'SmartSearch'), or(eq(parameters.version, 'R4'), eq(parameters.version, 'R4B'))) }}:
      - job: 'SqlIntegrationTests_${{ shard.name }}'
        timeoutInMinutes: 75
        pool:
          name: '$(SharedLinuxPool)'
          vmImage: '$(LinuxVmImage)'
        steps:
        - checkout: self
          fetchDepth: 1
          fetchTags: false
          path: source

        - template: integration-setup.yml

        - template: integration-tests-extract.yml
          parameters:
            version: ${{ parameters.version }}

        - template: integration-tests-run.yml
          parameters:
            version: ${{ parameters.version }}
            dataStore: 'Sql'
            keyVaultName: '${{ parameters.keyVaultName }}'
            testFilter: 'FullyQualifiedName!~CosmosDb&${{ shard.testFilter }}'
            testRunTitle: '${{ parameters.version }} SQL Integration Tests ${{ shard.name }}'
            artifactSuffix: 'Sql_${{ parameters.version }}_${{ shard.name }}'
            integrationSqlServerName: '${{ parameters.integrationSqlServerName }}'

- ${{ if eq(parameters.runShardedE2eJobs, false) }}:
  - job: 'sqlE2eTests'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        testFilter: 'FullyQualifiedName~SqlServer&${{ parameters.mainCategoryFilter }}'

- ${{ if eq(parameters.runShardedE2eJobs, true) }}:
  - ${{ each shard in parameters.e2eTestShards }}:
    - job: 'sqlE2eTests_${{ shard.name }}'
      timeoutInMinutes: 120
      dependsOn: []
      pool:
        name: '$(SharedLinuxPool)'
        vmImage: '$(LinuxVmImage)'
      variables:
        AllowPtrToDetectTestRunRetryFiles: true
      steps:
      - template: e2e-setup.yml
      - template: e2e-tests.yml
        parameters:
          version: ${{ parameters.version }}
          containerAppName: '${{ parameters.containerAppName }}'
          appServiceType: 'SqlServer'
          testFilter: '${{ shard.testFilter }}'
          testRunTitleSuffix: ' ${{ shard.name }}'

- ${{ if and(eq(parameters.runBulkUpdateJob, true), eq(parameters.runShardedE2eJobs, false)) }}:
  - job: 'sqlE2eTests_BulkUpdate'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        testFilter: 'FullyQualifiedName~SqlServer&Category=BulkUpdate'
        testRunTitleSuffix: ' BulkUpdate'

- ${{ if and(eq(parameters.runReindexJob, true), eq(parameters.runShardedE2eJobs, false)) }}:
  - job: 'sqlE2eTests_Reindex'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        testFilter: 'FullyQualifiedName~SqlServer&Category=IndexAndReindex&FullyQualifiedName!~CustomSearchParamTests'
        testRunTitleSuffix: ' Reindex'

- ${{ if eq(parameters.runShardedE2eJobs, true) }}:
  - job: 'sqlE2eTests_RequiresIsolation'
    timeoutInMinutes: 120
    dependsOn:
    - ${{ each shard in parameters.e2eTestShards }}:
      - 'sqlE2eTests_${{ shard.name }}'
    condition: not(canceled())
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    variables:
      AllowPtrToDetectTestRunRetryFiles: true
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        testFilter: 'FullyQualifiedName~SqlServer&Category=RequiresIsolation&Category!=ExportLongRunning&Category!=ImportLongRunning'
        testRunTitleSuffix: ' RequiresIsolation'
