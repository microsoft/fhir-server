parameters:
- name: version
  type: string
- name: keyVaultName
  type: string
- name: containerAppName
  type: string
- name: integrationSqlServerName
  type: string
- name: mainCategoryFilter
  type: string
  default: 'Category!=ExportLongRunning&Category!=ImportLongRunning&Category!=RequiresIsolation&Category!=IndexAndReindex&Category!=BulkUpdate'
- name: runShardedIntegrationTests
  type: boolean
  default: false
- name: integrationTestShards
  type: object
  # Keep category shards before class-name shards. New SQL-heavy integration test classes may need to be added to SqlSpecific.
  # Recheck local discovery counts when changing integration test categories or shard filters.
  default:
    - name: General
      testFilter: 'Category!=SmartOnFhir&Category!=IndexAndReindex&Category!=Search&Category!=SearchParameterStatus&FullyQualifiedName!~SqlServer&FullyQualifiedName!~SqlComplex&FullyQualifiedName!~SqlDataReader&FullyQualifiedName!~SqlRetry&FullyQualifiedName!~QueryPlanReuseChecker&FullyQualifiedName!~QueueClient&FullyQualifiedName!~ExpiredResourceCleanupWatchdog&FullyQualifiedName!~SearchParameterOptimisticConcurrency'
    - name: SmartSearch
      testFilter: 'Category=SmartOnFhir'
    - name: Search
      testFilter: '(Category=Search|Category=SearchParameterStatus)&Category!=SmartOnFhir'
    - name: Reindex
      testFilter: 'Category=IndexAndReindex'
    - name: SqlSpecific
      testFilter: '(FullyQualifiedName~SqlServer|FullyQualifiedName~SqlComplex|FullyQualifiedName~SqlDataReader|FullyQualifiedName~SqlRetry|FullyQualifiedName~QueryPlanReuseChecker|FullyQualifiedName~QueueClient|FullyQualifiedName~ExpiredResourceCleanupWatchdog|FullyQualifiedName~SearchParameterOptimisticConcurrency)&Category!=IndexAndReindex&Category!=Search&Category!=SearchParameterStatus&Category!=SmartOnFhir'
- name: runShardedE2eJobs
  type: boolean
  default: false
- name: e2eTestShards
  type: object
  # Shard names must be valid Azure Pipelines job identifiers. Tests tagged RequiresIsolation run in a terminal lane below.
  default:
    - name: General
      categoryFilter: 'Category!=BulkDelete&Category!=CustomSearch&Category!=History&Category!=Import&Category!=Search&Category!=Sort&Category!=CompartmentSearch&Category!=ConditionalOperations&Category!=Patch&Category!=Bundle&Category!=BundleTransaction'
      testFilter: ''
    - name: Search
      categoryFilter: '(Category=Search|Category=Sort|Category=CompartmentSearch)&Category!=CustomSearch&Category!=BundleTransaction'
      testFilter: ''
    - name: Import
      categoryFilter: 'Category=Import'
      testFilter: ''
    - name: Mutation
      categoryFilter: '(Category=ConditionalOperations|Category=Patch|Category=Bundle|Category=BundleTransaction)'
      testFilter: ''
    - name: CustomSearch
      categoryFilter: 'Category=CustomSearch'
      testFilter: 'FullyQualifiedName~SqlServer&FullyQualifiedName~CustomSearchParamTests&Category!=RequiresIsolation'
    - name: History
      categoryFilter: 'Category=History'
      testFilter: ''
- name: runReindexJob
  type: boolean
  default: true
- name: runBulkUpdateJob
  type: boolean
  default: true
jobs:

- ${{ if eq(parameters.runShardedIntegrationTests, false) }}:
  - job: "SqlIntegrationTests"
    timeoutInMinutes: 75
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - checkout: self
      fetchDepth: 1
      fetchTags: false
      path: source

    - template: integration-setup.yml

    - template: integration-tests-extract.yml
      parameters:
        version: ${{ parameters.version }}

    - task: AzureKeyVault@1
      displayName: 'Azure Key Vault: ${{ parameters.keyVaultName }}'
      inputs:
        azureSubscription: $(ConnectedServiceName)
        KeyVaultName: '${{ parameters.keyVaultName }}'

    - task: AzurePowerShell@5
      displayName: 'Set Workload Identity Variables'
      inputs:
        azureSubscription: $(ConnectedServiceName)
        azurePowerShellVersion: latestVersion
        pwsh: true
        ScriptType: inlineScript
        Inline: |
          Write-Host "##vso[task.setvariable variable=AZURESUBSCRIPTION_CLIENT_ID]$env:AZURESUBSCRIPTION_CLIENT_ID"
          Write-Host "##vso[task.setvariable variable=AZURESUBSCRIPTION_TENANT_ID]$env:AZURESUBSCRIPTION_TENANT_ID"
          Write-Host "##vso[task.setvariable variable=AZURESUBSCRIPTION_SERVICE_CONNECTION_ID]$env:AZURESUBSCRIPTION_SERVICE_CONNECTION_ID"

    - task: DotNetCoreCLI@2
      displayName: 'Build Integration Test Projects'
      inputs:
        command: build
        projects: '$(Pipeline.Workspace)/source/test/**/*${{ parameters.version }}.Tests.Integration.csproj'
        arguments: '--configuration $(buildConfiguration) -f $(defaultBuildFramework)'

    - task: DotNetCoreCLI@2
      displayName: 'Run SQL Integration Tests with coverage'
      inputs:
        command: test
        projects: '$(Pipeline.Workspace)/source/test/**/*${{ parameters.version }}.Tests.Integration.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build -f $(defaultBuildFramework) -- --filter "FullyQualifiedName!~CosmosDb" --retry-failed-tests 3 --coverage --coverage-output-format cobertura --coverage-settings "$(System.DefaultWorkingDirectory)/CodeCoverage.Mtp.settings.xml" --report-trx'
        testRunTitle: '${{ parameters.version }} SQL Integration Tests'
      env:
        'SqlServer:ConnectionString': 'Server=tcp:${{ parameters.integrationSqlServerName }}.database.windows.net,1433;Initial Catalog=master;Persist Security Info=False;Authentication=ActiveDirectoryWorkloadIdentity;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;User Id=$(AZURESUBSCRIPTION_CLIENT_ID);'
        platformOptions__resultDirectory: '$(Agent.TempDirectory)/coverage'
        'AZURESUBSCRIPTION_CLIENT_ID': '$(AZURESUBSCRIPTION_CLIENT_ID)'
        'AZURESUBSCRIPTION_TENANT_ID': '$(AZURESUBSCRIPTION_TENANT_ID)'
        'AZURESUBSCRIPTION_SERVICE_CONNECTION_ID': '$(AZURESUBSCRIPTION_SERVICE_CONNECTION_ID)'
        'SYSTEM_ACCESSTOKEN': $(System.AccessToken)

    - task: PublishTestResults@2
      displayName: 'Publish integration test results'
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/coverage/**/*.trx'
        mergeTestResults: true
        testRunTitle: '${{ parameters.version }} SQL Integration Tests'
        # TODO: Re-enable when https://github.com/microsoft/testfx/issues/7167 is fixed
        failTaskOnFailedTests: false
      condition: succeededOrFailed()

    - task: PowerShell@2
      displayName: 'Report SQL integration duration by class'
      condition: succeededOrFailed()
      inputs:
        targetType: filePath
        filePath: '$(System.DefaultWorkingDirectory)/build/scripts/Write-TestClassDurationReport.ps1'
        pwsh: true
        arguments: >-
          -ResultsDirectory "$(Agent.TempDirectory)/coverage"
          -OutputDirectory "$(Agent.TempDirectory)/test-class-duration"
          -ReportName "Sql_${{ parameters.version }}_Integration_ByClass"

    - task: PublishBuildArtifacts@1
      displayName: 'Publish SQL integration class duration report'
      condition: succeededOrFailed()
      inputs:
        pathToPublish: '$(Agent.TempDirectory)/test-class-duration'
        artifactName: 'TestClassDuration_IntegrationTests_Sql_${{ parameters.version }}'
        artifactType: 'container'

    - task: reportgenerator@5
      displayName: 'Aggregate SQL integration test coverage'
      condition: succeededOrFailed()
      inputs:
        reports: '$(Agent.TempDirectory)/coverage/**/*.cobertura.xml'
        reporttypes: 'Cobertura'
        targetdir: '$(Agent.TempDirectory)/coverage-aggregated'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish SQL integration test coverage'
      inputs:
        pathToPublish: '$(Agent.TempDirectory)/coverage-aggregated'
        artifactName: 'Coverage_IntegrationTests_Sql_${{ parameters.version }}'
        artifactType: 'container'

- ${{ if eq(parameters.runShardedIntegrationTests, true) }}:
  - ${{ each shard in parameters.integrationTestShards }}:
    - ${{ if or(ne(shard.name, 'SmartSearch'), or(eq(parameters.version, 'R4'), eq(parameters.version, 'R4B'))) }}:
      - job: 'SqlIntegrationTests_${{ shard.name }}'
        timeoutInMinutes: 75
        pool:
          name: '$(SharedLinuxPool)'
          vmImage: '$(LinuxVmImage)'
        steps:
        - checkout: self
          fetchDepth: 1
          fetchTags: false
          path: source

        - template: integration-setup.yml

        - template: integration-tests-extract.yml
          parameters:
            version: ${{ parameters.version }}

        - task: AzureKeyVault@1
          displayName: 'Azure Key Vault: ${{ parameters.keyVaultName }}'
          inputs:
            azureSubscription: $(ConnectedServiceName)
            KeyVaultName: '${{ parameters.keyVaultName }}'

        - task: AzurePowerShell@5
          displayName: 'Set Workload Identity Variables'
          inputs:
            azureSubscription: $(ConnectedServiceName)
            azurePowerShellVersion: latestVersion
            pwsh: true
            ScriptType: inlineScript
            Inline: |
              Write-Host "##vso[task.setvariable variable=AZURESUBSCRIPTION_CLIENT_ID]$env:AZURESUBSCRIPTION_CLIENT_ID"
              Write-Host "##vso[task.setvariable variable=AZURESUBSCRIPTION_TENANT_ID]$env:AZURESUBSCRIPTION_TENANT_ID"
              Write-Host "##vso[task.setvariable variable=AZURESUBSCRIPTION_SERVICE_CONNECTION_ID]$env:AZURESUBSCRIPTION_SERVICE_CONNECTION_ID"

        - task: DotNetCoreCLI@2
          displayName: 'Build Integration Test Projects'
          inputs:
            command: build
            projects: '$(Pipeline.Workspace)/source/test/**/*${{ parameters.version }}.Tests.Integration.csproj'
            arguments: '--configuration $(buildConfiguration) -f $(defaultBuildFramework)'

        - task: DotNetCoreCLI@2
          displayName: 'Run SQL Integration Tests ${{ shard.name }} with coverage'
          inputs:
            command: test
            projects: '$(Pipeline.Workspace)/source/test/**/*${{ parameters.version }}.Tests.Integration.csproj'
            arguments: '--configuration $(buildConfiguration) --no-build -f $(defaultBuildFramework) -- --filter "FullyQualifiedName!~CosmosDb&${{ shard.testFilter }}" --retry-failed-tests 3 --coverage --coverage-output-format cobertura --coverage-settings "$(System.DefaultWorkingDirectory)/CodeCoverage.Mtp.settings.xml" --report-trx'
            testRunTitle: '${{ parameters.version }} SQL Integration Tests ${{ shard.name }}'
          env:
            'SqlServer:ConnectionString': 'Server=tcp:${{ parameters.integrationSqlServerName }}.database.windows.net,1433;Initial Catalog=master;Persist Security Info=False;Authentication=ActiveDirectoryWorkloadIdentity;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;User Id=$(AZURESUBSCRIPTION_CLIENT_ID);'
            platformOptions__resultDirectory: '$(Agent.TempDirectory)/coverage'
            'AZURESUBSCRIPTION_CLIENT_ID': '$(AZURESUBSCRIPTION_CLIENT_ID)'
            'AZURESUBSCRIPTION_TENANT_ID': '$(AZURESUBSCRIPTION_TENANT_ID)'
            'AZURESUBSCRIPTION_SERVICE_CONNECTION_ID': '$(AZURESUBSCRIPTION_SERVICE_CONNECTION_ID)'
            'SYSTEM_ACCESSTOKEN': $(System.AccessToken)

        - task: PublishTestResults@2
          displayName: 'Publish integration test results'
          inputs:
            testResultsFormat: 'VSTest'
            testResultsFiles: '$(Agent.TempDirectory)/coverage/**/*.trx'
            mergeTestResults: true
            testRunTitle: '${{ parameters.version }} SQL Integration Tests ${{ shard.name }}'
            # TODO: Re-enable when https://github.com/microsoft/testfx/issues/7167 is fixed
            failTaskOnFailedTests: false
          condition: succeededOrFailed()

        - task: reportgenerator@5
          displayName: 'Aggregate SQL integration test coverage ${{ shard.name }}'
          condition: succeededOrFailed()
          inputs:
            reports: '$(Agent.TempDirectory)/coverage/**/*.cobertura.xml'
            reporttypes: 'Cobertura'
            targetdir: '$(Agent.TempDirectory)/coverage-aggregated'

        - task: PublishBuildArtifacts@1
          displayName: 'Publish SQL integration test coverage ${{ shard.name }}'
          inputs:
            pathToPublish: '$(Agent.TempDirectory)/coverage-aggregated'
            artifactName: 'Coverage_IntegrationTests_Sql_${{ parameters.version }}_${{ shard.name }}'
            artifactType: 'container'

- ${{ if eq(parameters.runShardedE2eJobs, false) }}:
  - job: 'sqlE2eTests'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        categoryFilter: '${{ parameters.mainCategoryFilter }}'

- ${{ if eq(parameters.runShardedE2eJobs, true) }}:
  - ${{ each shard in parameters.e2eTestShards }}:
    - job: 'sqlE2eTests_${{ shard.name }}'
      timeoutInMinutes: 120
      dependsOn: []
      pool:
        name: '$(SharedLinuxPool)'
        vmImage: '$(LinuxVmImage)'
      steps:
      - template: e2e-setup.yml
      - template: e2e-tests.yml
        parameters:
          version: ${{ parameters.version }}
          containerAppName: '${{ parameters.containerAppName }}'
          appServiceType: 'SqlServer'
          categoryFilter: '${{ parameters.mainCategoryFilter }}&${{ shard.categoryFilter }}'
          testFilter: '${{ shard.testFilter }}'
          testRunTitleSuffix: ' ${{ shard.name }}'

- ${{ if and(eq(parameters.runBulkUpdateJob, true), eq(parameters.runShardedE2eJobs, false)) }}:
  - job: 'sqlE2eTests_BulkUpdate'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        categoryFilter: 'Category=BulkUpdate'
        testRunTitleSuffix: ' BulkUpdate'

- ${{ if and(eq(parameters.runReindexJob, true), eq(parameters.runShardedE2eJobs, false)) }}:
  - job: 'sqlE2eTests_Reindex'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        categoryFilter: 'Category=IndexAndReindex&FullyQualifiedName!~CustomSearchParamTests'
        testRunTitleSuffix: ' Reindex'

- ${{ if eq(parameters.runShardedE2eJobs, true) }}:
  - job: 'sqlE2eTests_RequiresIsolation'
    timeoutInMinutes: 120
    dependsOn: []
    pool:
      name: '$(SharedLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: e2e-setup.yml
    - template: e2e-tests.yml
      parameters:
        version: ${{ parameters.version }}
        containerAppName: '${{ parameters.containerAppName }}'
        appServiceType: 'SqlServer'
        categoryFilter: 'Category=RequiresIsolation&Category!=ExportLongRunning&Category!=ImportLongRunning'
        testRunTitleSuffix: ' RequiresIsolation'
