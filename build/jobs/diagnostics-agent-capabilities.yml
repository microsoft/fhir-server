parameters:
- name: jobName
  type: string
- name: displayName
  type: string
- name: poolName
  type: string
- name: osDemand
  type: string

jobs:
- job: ${{ parameters.jobName }}
  displayName: ${{ parameters.displayName }}
  continueOnError: true
  pool:
    name: '${{ parameters.poolName }}'
    demands:
      - Agent.OS -equals ${{ parameters.osDemand }}
  steps:
  - pwsh: |
      $ErrorActionPreference = 'Stop'

      if ([string]::IsNullOrWhiteSpace($env:SYSTEM_ACCESSTOKEN)) {
        Write-Warning "SYSTEM_ACCESSTOKEN is empty. Enable 'Allow scripts to access OAuth token' in pipeline settings to query pool capabilities."
        Write-Host "Current agent: Name=$env:AGENT_NAME OS=$env:AGENT_OS"
        return
      }

      $org = "$(System.CollectionUri)".TrimEnd('/')
      $headers = @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }
      $poolNames = @('$(DefaultLinuxPool)', '$(InternalWindowsPool)') | Select-Object -Unique

      foreach ($poolName in $poolNames) {
        Write-Host "##[group]Pool capability snapshot: $poolName"

        $poolUri = "$org/_apis/distributedtask/pools?poolName=$([uri]::EscapeDataString($poolName))&api-version=7.1-preview.1"
        $poolResponse = Invoke-RestMethod -Method Get -Headers $headers -Uri $poolUri

        if (-not $poolResponse.value -or $poolResponse.value.Count -eq 0) {
          Write-Warning "Pool '$poolName' not found"
          Write-Host "##[endgroup]"
          continue
        }

        $poolId = $poolResponse.value[0].id
        $agentUri = "$org/_apis/distributedtask/pools/$poolId/agents?includeCapabilities=true&includeAssignedRequest=true&api-version=7.1-preview.1"
        $agentResponse = Invoke-RestMethod -Method Get -Headers $headers -Uri $agentUri

        if (-not $agentResponse.value -or $agentResponse.value.Count -eq 0) {
          Write-Warning "Pool '$poolName' has no agents"
          Write-Host "##[endgroup]"
          continue
        }

        $agents = $agentResponse.value
        foreach ($agent in $agents) {
          $os = $agent.systemCapabilities.'Agent.OS'
          $imageOverride = $agent.systemCapabilities.ImageOverride
          Write-Host "Agent=$($agent.name); Enabled=$($agent.enabled); Status=$($agent.status); Agent.OS=$os; ImageOverride=$imageOverride"
        }

        Write-Host "OS distribution:"
        $agents |
          Group-Object { $_.systemCapabilities.'Agent.OS' } |
          Sort-Object Name |
          ForEach-Object { Write-Host "  $($_.Name): $($_.Count)" }

        $capabilityKeys = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
        foreach ($agent in $agents) {
          if ($agent.systemCapabilities) {
            foreach ($key in $agent.systemCapabilities.Keys) {
              [void]$capabilityKeys.Add([string]$key)
            }
          }

          if ($agent.userCapabilities) {
            foreach ($key in $agent.userCapabilities.Keys) {
              [void]$capabilityKeys.Add([string]$key)
            }
          }
        }

        Write-Host "Capability keys available for demands ($($capabilityKeys.Count) total):"
        $capabilityKeys |
          Sort-Object |
          ForEach-Object { Write-Host "  $_" }

        Write-Host "##[endgroup]"
      }
    displayName: 'Print pool capabilities and Agent.OS summary'
    continueOnError: true
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
