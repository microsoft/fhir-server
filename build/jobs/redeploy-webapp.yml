parameters:
- name: version
  type: string
- name: webAppName
  type: string
- name: subscription
  type: string
- name: imageTag
  type: string
- name: resourceGroup
  type: string
# When set, emits a deployment job targeting this ADO Environment so the
# Exclusive Lock check on the env serializes concurrent CI runs.
- name: lockEnvironment
  type: string
  default: ''

jobs:
- ${{ if eq(parameters.lockEnvironment, '') }}:
  - job: provisionEnvironment
    pool:
      name: '$(DefaultLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: redeploy-webapp-steps.yml
      parameters:
        version: ${{ parameters.version }}
        webAppName: ${{ parameters.webAppName }}
        subscription: ${{ parameters.subscription }}
        imageTag: ${{ parameters.imageTag }}
        resourceGroup: ${{ parameters.resourceGroup }}

- ${{ if ne(parameters.lockEnvironment, '') }}:
  - deployment: provisionEnvironment
    environment: ${{ parameters.lockEnvironment }}
    pool:
      name: '$(DefaultLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    strategy:
      runOnce:
        deploy:
          steps:
          - template: redeploy-webapp-steps.yml
            parameters:
              version: ${{ parameters.version }}
              webAppName: ${{ parameters.webAppName }}
              subscription: ${{ parameters.subscription }}
              imageTag: ${{ parameters.imageTag }}
              resourceGroup: ${{ parameters.resourceGroup }}
