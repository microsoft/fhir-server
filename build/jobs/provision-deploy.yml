parameters:
- name: version
  type: string
- name: webAppName
  type: string
- name: acaEnvironmentName
  type: string
- name: subscription
  type: string
- name: resourceGroup
  type: string
- name: testEnvironmentUrl
  type: string
- name: imageTag
  type: string
- name: dataStore
  type: string
  # Accepted values: 'sql' or 'cosmos'
- name: schemaAutomaticUpdatesEnabled
  type: string
  default: 'auto'
- name: sqlServerName
  type: string
  default: ''
- name: sqlComputeTier
  type: string
  default: ''
- name: reindexEnabled
  type: boolean
  default: true
- name: sqlElasticPoolName
  type: string
  default: ''
- name: keyVaultName
  type: string

jobs:
- job: provisionEnvironment
  pool:
    name: '$(SharedLinuxPool)'
    vmImage: '$(LinuxVmImage)'
  steps:
  - task: AzureKeyVault@1
    displayName: 'Azure Key Vault: resolute-oss-tenant-info'
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      KeyVaultName: 'resolute-oss-tenant-info'

  - task: AzurePowerShell@5
    name: SetAcaOutputs
    displayName: 'Deploy ACA (${{ parameters.dataStore }}) and emit test URL'
    retryCountOnTaskFailure: 1
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      azurePowerShellVersion: latestVersion
      pwsh: true
      ScriptType: FilePath
      ScriptPath: '$(System.DefaultWorkingDirectory)/build/jobs/scripts/Provision-AcaDeploy.ps1'
      ScriptArguments: >-
        -DataStore "${{ parameters.dataStore }}"
        -Version "${{ parameters.version }}"
        -WebAppName "${{ parameters.webAppName }}"
        -AcaEnvironmentName "${{ parameters.acaEnvironmentName }}"
        -ResourceGroup "${{ parameters.resourceGroup }}"
        -KeyVaultName "${{ parameters.keyVaultName }}"
        -ImageTag "${{ parameters.imageTag }}"
        -TestEnvironmentUrl "${{ parameters.testEnvironmentUrl }}"
        -WorkingDirectory "$(System.DefaultWorkingDirectory)"
        -AzureContainerRegistry "$(azureContainerRegistry)"
        -TenantIdGuid "$(tenant-id-guid)"
        -SqlServerName "${{ parameters.sqlServerName }}"
        -SqlElasticPoolName "${{ parameters.sqlElasticPoolName }}"
        -SchemaAutomaticUpdatesEnabled "${{ parameters.schemaAutomaticUpdatesEnabled }}"
        -ReindexEnabled "${{ parameters.reindexEnabled }}"
        -MinReplicas $(minReplicas)
        -MaxReplicas $(maxReplicas)
        -ContainerCpu "$(containerCpu)"
        -ContainerMemory "$(containerMemory)"
        -CosmosAutoscaleMaxThroughput $(cosmosAutoscaleMaxThroughput)
        -TaskHostingPollingFrequencyInSeconds $(taskHostingPollingFrequencyInSeconds)
        -TaskHostingMaxRunningTaskCount $(taskHostingMaxRunningTaskCount)
        -SearchParameterCacheRefreshIntervalSeconds $(searchParameterCacheRefreshIntervalSeconds)
        -SystemConformanceProviderRefreshIntervalSeconds $(systemConformanceProviderRefreshIntervalSeconds)
        -ReindexCacheRefreshWaitMultiplier $(reindexCacheRefreshWaitMultiplier)
