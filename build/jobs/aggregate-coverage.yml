steps:
- checkout: none

# Download all coverage artifacts from all test stages
- task: DownloadPipelineArtifact@2
  displayName: 'Download all coverage artifacts'
  inputs:
    path: '$(Pipeline.Workspace)/AllCoverage'
    patterns: |
      Coverage_UnitTests/**
      Coverage_IntegrationTests_*/**

# Aggregate all coverage files into a single report
- task: reportgenerator@5
  displayName: 'Aggregate all coverage reports'
  inputs:
    reports: '$(Pipeline.Workspace)/AllCoverage/**/Cobertura.xml'
    reporttypes: 'Cobertura;HtmlInline_AzurePipelines'
    targetdir: '$(Pipeline.Workspace)/AggregatedCoverage'

# Publish the aggregated coverage artifact
- task: PublishBuildArtifacts@1
  displayName: 'Publish aggregated coverage artifact'
  continueOnError: true  # Allow re-runs if artifact already exists
  inputs:
    pathToPublish: '$(Pipeline.Workspace)/AggregatedCoverage'
    artifactName: 'Coverage_Aggregated'
    artifactType: 'container'

# Publish to Azure DevOps for pipeline UI visualization and 1ES telemetry
- task: PublishCodeCoverageResults@2
  displayName: 'Publish aggregated code coverage to pipeline and 1ES telemetry'
  inputs:
    summaryFileLocation: '$(Pipeline.Workspace)/AggregatedCoverage/Cobertura.xml'
    failIfCoverageEmpty: false

# Upload coverage to Codecov for PR diff coverage checks and comments
- checkout: self
  fetchDepth: 1
  displayName: 'Shallow checkout for Codecov git context'

- script: |
    # Fix file paths in Cobertura XML before uploading.
    # DeterministicReport + SourceLink produces full GitHub raw URLs as filenames:
    #   https://raw.githubusercontent.com/microsoft/fhir-server/<sha>/src/...
    # Codecov needs repo-relative paths like: src/...
    REPORT="$(Pipeline.Workspace)/AggregatedCoverage/Cobertura.xml"
    echo "=== Sample paths before fix ==="
    grep -oP 'filename="[^"]*"' "$REPORT" | head -5

    sed -i 's|https://raw\.githubusercontent\.com/microsoft/fhir-server/[^/]*/||g' "$REPORT"

    echo "=== Sample paths after fix ==="
    grep -oP 'filename="[^"]*"' "$REPORT" | head -5

    # Download Codecov CLI
    curl -Os https://cli.codecov.io/latest/linux/codecov
    chmod +x codecov

    # Resolve commit SHA and branch for the upload
    if [ "$BUILD_REASON" = "PullRequest" ]; then
      COMMIT_SHA=$(git rev-parse HEAD^2 2>/dev/null || echo "$BUILD_SOURCE_VERSION")
      BRANCH="$PR_SOURCE_BRANCH"
      PR_FLAG="--pr $PR_NUMBER"
    else
      COMMIT_SHA="$BUILD_SOURCE_VERSION"
      BRANCH="$BUILD_SOURCE_BRANCH"
      PR_FLAG=""
    fi

    echo "Commit SHA: $COMMIT_SHA"
    echo "Branch: $BRANCH"
    echo "PR Flag: $PR_FLAG"

    ./codecov --verbose upload-process \
      --disable-search \
      --git-service github \
      --slug microsoft/fhir-server \
      --sha "$COMMIT_SHA" \
      --branch "$BRANCH" \
      $PR_FLAG \
      -f "$REPORT"
  displayName: 'Upload coverage to Codecov'
  condition: succeededOrFailed()
  env:
    CODECOV_TOKEN: $(CODECOV_TOKEN)
    BUILD_REASON: $(Build.Reason)
    BUILD_SOURCE_VERSION: $(Build.SourceVersion)
    BUILD_SOURCE_BRANCH: $(Build.SourceBranch)
    PR_SOURCE_BRANCH: $(System.PullRequest.SourceBranch)
    PR_NUMBER: $(System.PullRequest.PullRequestNumber)
