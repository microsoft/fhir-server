- stage: testStu3Cosmos
  displayName: 'Run Stu3 Cosmos Tests'
  dependsOn:
  - BuildArtifacts
  - setupEnvironment
  - setupAad
  - deployStu3
  variables:
    TestEnvironmentUrl_Stu3: $[stageDependencies.deployStu3.provisionEnvironment.outputs['SetAcaOutputs.TestEnvironmentUrl_Stu3']]
    TestEnvironmentUrl: $[stageDependencies.deployStu3.provisionEnvironment.outputs['SetAcaOutputs.TestEnvironmentUrl']]
  jobs:
  - template: ./jobs/run-cosmos-tests.yml
    parameters:
      version: Stu3
      keyVaultName: $(KeyVaultBaseName)
      containerAppName: $(DeploymentEnvironmentName)
      runShardedIntegrationTests: true
      runShardedE2eJobs: true

