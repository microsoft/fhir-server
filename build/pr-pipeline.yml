  displayName: 'Run Stu3 SQL Tests'
  dependsOn:
  - BuildArtifacts
  - setupEnvironment
  - setupAad
  - deployStu3Sql
  - deployStu3SqlIso
  variables:
    TestEnvironmentUrl_Stu3_Sql: $[stageDependencies.deployStu3Sql.provisionEnvironment.outputs['SetAcaOutputs.TestEnvironmentUrl_Stu3_Sql']]
    TestEnvironmentUrl_Sql: $[stageDependencies.deployStu3Sql.provisionEnvironment.outputs['SetAcaOutputs.TestEnvironmentUrl_Sql']]
  jobs:
  - template: ./jobs/run-sql-tests.yml
    parameters:
      version: Stu3
      keyVaultName: $(KeyVaultNameSql)
      containerAppName: $(DeploymentEnvironmentNameSql)
      isolationContainerAppName: $(DeploymentEnvironmentNameSqlIso)
      integrationSqlServerName: $(DeploymentEnvironmentName)inttest
      runShardedIntegrationTests: true
      runShardedE2eJobs: true

