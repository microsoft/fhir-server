variables:
    ResourceGroupRegion: 'westus2'
    resourceGroupRoot: 'msh-fhir-pr'
    ResourceGroupName: '$(resourceGroupRoot)-$(prName)'
    # Unique resource group name with Build.BuildId suffix to avoid waiting for deletion of existing RG
    UniqueResourceGroupName: '$(resourceGroupRoot)-$(prName)-$(Build.BuildId)'
    # Base name for Key Vaults (kept short due to 24 char limit)
    KeyVaultBaseName: 'f$(build.BuildNumber)'
    # Deployment environment name includes BuildId for uniqueness across builds
    DeploymentEnvironmentName: 'f$(build.BuildNumber)-$(Build.BuildId)'
    TestEnvironmentName: 'OSS PR$(prName)'
    ImageTag: '$(build.BuildNumber)'

    # Shared ACA scaling/sizing values consumed by build/jobs/provision-deploy.yml.
    # Centralized here so all PR provision-deploy invocations stay consistent.
    minReplicas: 3
    maxReplicas: 8
    containerCpu: '0.5'
    containerMemory: '1Gi'
    cosmosAutoscaleMaxThroughput: 5000

    # Shared FHIR runtime tuning values consumed by build/jobs/provision-deploy.yml.
    taskHostingPollingFrequencyInSeconds: 1
    taskHostingMaxRunningTaskCount: 4
    searchParameterCacheRefreshIntervalSeconds: 2
    systemConformanceProviderRefreshIntervalSeconds: 5
    reindexCacheRefreshWaitMultiplier: 6

    # The following is passed in from a Pipeline variable, this allows it to be overriden if required.
    # prName: $(system.pullRequest.pullRequestNumber)
