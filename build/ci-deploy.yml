# DESCRIPTION: 	
# Deploys the CI environment in case the persistent resources are deleted or broken.
# This pipeline is only needed if CI is broken. It can be months between runs.
# As CI is a persistent environment this pipeline should not be run unless needed.

name: $(SourceBranchName)-$(Date:yyyyMMdd)$(Rev:-r)
trigger: none

variables:
- template: ci-variables.yml
- template: build-variables.yml

stages:
- stage: UpdateVersion
  displayName: 'Determine Semver'
  dependsOn: []
  jobs:
  - job: Semver
    pool:
      name: '$(DefaultLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - template: ./jobs/update-semver.yml 

- stage: DockerBuild  
  displayName: 'Build images'
  dependsOn:
  - UpdateVersion
  variables:
    assemblySemFileVer: $[stageDependencies.UpdateVersion.Semver.outputs['SetVariablesFromGitVersion.assemblySemFileVer']]
  jobs:
  - template: ./jobs/docker-build-all.yml
    parameters: 
      tag: $(ImageTag)
      buildPlatform: $(publicDockerImagePlatforms)

- stage: provisionEnvironment
  displayName: Provision Environment
  dependsOn: []
  jobs:
  - template: ./jobs/cleanup-resourcegroup-aad.yml
  - job: provision
    dependsOn: DeleteResourceGroup 
    steps:
    - task: AzurePowerShell@5
      displayName: Provision Resource Group
      inputs:
        azureSubscription: $(ConnectedServiceName)
        azurePowerShellVersion: latestVersion
        pwsh: true
        ScriptType: inlineScript
        Inline: |
          New-AzResourceGroup -Name "$(DeploymentEnvironmentName)" -Location "$(ResourceGroupRegion)" -Force
    - template: ./jobs/add-resource-group-role-assignments.yml
      parameters:
        azureSubscription: $(ConnectedServiceName)
        resourceGroupName: $(ResourceGroupName)

- stage: createAcaEnvironment
  displayName: 'Create ACA Managed Environment'
  dependsOn:
  - provisionEnvironment
  jobs:
  - job: createAcaEnvironment
    displayName: 'Create ACA Managed Environment'
    pool:
      name: '$(DefaultLinuxPool)'
      vmImage: '$(LinuxVmImage)'
    steps:
    - task: AzurePowerShell@5
      displayName: 'Create ACA Managed Environment'
      inputs:
        azureSubscription: $(ConnectedServiceName)
        azurePowerShellVersion: latestVersion
        pwsh: true
        ScriptType: inlineScript
        Inline: |
          $envName = '$(AcaEnvironmentName)'.ToLowerInvariant()
          $rgName = '$(ResourceGroupName)'
          $location = '$(ResourceGroupRegion)'

          if ($envName.Length -gt 32) {
              $envName = $envName.Substring(0, 32).TrimEnd('-')
          }

          $existing = Get-AzResource -ResourceGroupName $rgName -ResourceType 'Microsoft.App/managedEnvironments' -Name $envName -ErrorAction SilentlyContinue
          if ($null -ne $existing) {
              Write-Host "ACA managed environment '$envName' already exists."
              return
          }

          Write-Host "Creating ACA managed environment '$envName' in '$rgName'..."
          New-AzResourceGroupDeployment `
              -Name "aca-env-$envName" `
              -ResourceGroupName $rgName `
              -TemplateFile $(System.DefaultWorkingDirectory)/samples/templates/aca/aca-environment.bicep `
              -environmentName $envName `
              -location $location `
              -Verbose -ErrorAction Stop
          Write-Host "ACA managed environment '$envName' created successfully."

- stage: createNsp
  displayName: 'Create Network Security Perimeter'
  dependsOn:
  - provisionEnvironment
  jobs:
  - template: ./jobs/provision-nsp.yml
    parameters:
      resourceGroup: $(ResourceGroupName)
      nspName: 'nsp-$(ResourceGroupName)'
      nspProfile: 'default'

- stage: aadTestEnvironment
  displayName: Setup AAD Test Environment
  dependsOn:
  - provisionEnvironment
  jobs:
  - job: deleteKeyVaults
    displayName: 'Delete and Purge Key Vaults'
    pool:
      vmImage: '$(WindowsVmImage)'
    steps:
    - template: ./tasks/purge-soft-deleted-keyvaults.yml
  - job: setup
    dependsOn: deleteKeyVaults
    pool:
      vmImage: '$(WindowsVmImage)'
    steps:
    - template: ./jobs/add-aad-test-environment.yml

- stage: deploySqlServer
  displayName: 'Deploy SQLServer'
  dependsOn:
  - createNsp
  - provisionEnvironment
  jobs:
  - template: ./jobs/provision-sqlServer.yml
    parameters:
      resourceGroup: $(ResourceGroupName)
      sqlServerName: $(DeploymentEnvironmentName)
      adminType: 'userAssignedManagedIdentity'
      adminUserAssignedManagedIdentityName: "$(DeploymentEnvironmentName)-uami"
      deploymentName: "AppServer"
      nspName: 'nsp-$(ResourceGroupName)'
  - template: ./jobs/provision-sqlServer.yml
    parameters:
      resourceGroup: $(ResourceGroupName)
      sqlServerName: $(DeploymentEnvironmentName)inttest
      adminType: 'federatedServiceConnection'
      deploymentName: "IntegrationTests"
      nspName: 'nsp-$(ResourceGroupName)'

- stage: deploySqlElasticPool
  displayName: 'Deploy SQL Elastic Pool (CI)'
  dependsOn:
  - deploySqlServer
  jobs:
  - template: ./jobs/provision-sqlElasticPool.yml
    parameters:
      resourceGroup: $(ResourceGroupName)
      sqlServerName: $(DeploymentEnvironmentName)
      elasticPoolName: $(DeploymentEnvironmentName)-pool
      capacity: 8
      dbMinCapacity: 0
      dbMaxCapacity: 8

- stage: deployStu3
  displayName: 'Deploy STU3 CosmosDB Site'
  dependsOn:
  - aadTestEnvironment
  - DockerBuild
  - createNsp
  - createAcaEnvironment
  jobs:
  - template: ./jobs/provision-deploy.yml
    parameters: 
      dataStore: cosmos
      version: Stu3
      webAppName: $(DeploymentEnvironmentName)
      acaEnvironmentName: $(AcaEnvironmentName)
      keyVaultName: $(KeyVaultBaseName)
      subscription: $(ConnectedServiceName)
      resourceGroup: $(ResourceGroupName)
      testEnvironmentUrl: $(TestApplicationResource)
      imageTag: $(ImageTag)
      taskHostingPollingFrequencyInSeconds: 30
      searchParameterCacheRefreshIntervalSeconds: 20
      systemConformanceProviderRefreshIntervalSeconds: 60
      reindexEnabled: true
      maxReplicas: 12
      containerCpu: '1.0'
      containerMemory: '2Gi'
      cosmosAutoscaleMaxThroughput: 8000

- stage: deployStu3Sql
  displayName: 'Deploy STU3 SQL Site'
  dependsOn:
  - aadTestEnvironment
  - DockerBuild
  - deploySqlServer
  - deploySqlElasticPool
  - createAcaEnvironment
  jobs:
  - template: ./jobs/provision-deploy.yml
    parameters: 
      dataStore: sql
      version: Stu3
      webAppName: $(DeploymentEnvironmentNameSql)
      acaEnvironmentName: $(AcaEnvironmentName)
      keyVaultName: $(KeyVaultNameSql)
      subscription: $(ConnectedServiceName)
      resourceGroup: $(ResourceGroupName)
      testEnvironmentUrl: $(TestApplicationResource)
      imageTag: $(ImageTag)
      schemaAutomaticUpdatesEnabled: 'auto'
      sqlServerName: $(DeploymentEnvironmentName)
      sqlComputeTier: 'Hyperscale'
      sqlElasticPoolName: $(DeploymentEnvironmentName)-pool
      taskHostingPollingFrequencyInSeconds: 30
      searchParameterCacheRefreshIntervalSeconds: 20
      systemConformanceProviderRefreshIntervalSeconds: 60
      reindexEnabled: true
      maxReplicas: 12
      containerCpu: '1.0'
      containerMemory: '2Gi'

