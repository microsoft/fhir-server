variables:
    ResourceGroupRegion: 'southcentralus'
    resourceGroupRoot: 'msh-fhir-ci'
    DeploymentEnvironmentName: '$(resourceGroupRoot)'
    AcaEnvironmentName: '$(DeploymentEnvironmentName)-acae'
    # CI uses the same name for Key Vaults as the deployment environment (no BuildId suffix needed)
    KeyVaultBaseName: '$(DeploymentEnvironmentName)'
    ResourceGroupName: '$(resourceGroupRoot)'
    UniqueResourceGroupName: '$(ResourceGroupName)'
    CrucibleEnvironmentUrl: 'https://crucible.mshapis.com/'
    TestEnvironmentName: 'OSS CI'
    ImageTag: '$(build.BuildNumber)'

    # Shared ACA scaling/sizing values consumed by build/jobs/provision-deploy.yml.
    # Centralized here so all CI provision-deploy invocations stay consistent.
    minReplicas: 3
    maxReplicas: 24
    containerCpu: '2.0'
    containerMemory: '4Gi'
    cosmosAutoscaleMaxThroughput: 5000

    # Shared FHIR runtime tuning values consumed by build/jobs/provision-deploy.yml.
    taskHostingPollingFrequencyInSeconds: 1
    taskHostingMaxRunningTaskCount: 4
    searchParameterCacheRefreshIntervalSeconds: 2
    systemConformanceProviderRefreshIntervalSeconds: 5
    reindexCacheRefreshWaitMultiplier: 6
